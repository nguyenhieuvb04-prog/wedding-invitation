<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lễ Thành Hôn - Thành Đạt & Phương Thảo</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family: 'Times New Roman', serif;
  background: linear-gradient(135deg,#1a1a1a,#2b2b2b);
  color:#fff;
  text-align:center;
  overflow-x:hidden;
  position:relative;
}

/* Gold frame */
body::before{
  content:"";
  position:fixed;
  inset:15px;
  border:1.5px solid rgba(248,165,194,0.6);
  pointer-events:none;
  border-radius:20px;
  box-shadow:0 0 30px rgba(248,165,194,0.25);
}

/* Sparkle effect */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:radial-gradient(circle at 20% 30%, rgba(212,175,55,0.15) 1px, transparent 1px),
                   radial-gradient(circle at 70% 60%, rgba(255,215,0,0.1) 1px, transparent 1px),
                   radial-gradient(circle at 40% 80%, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size:200px 200px;
  animation: sparkleMove 20s linear infinite;
  pointer-events:none;
}

@keyframes sparkleMove{
  from{background-position:0 0, 0 0, 0 0;}
  to{background-position:400px 400px, -300px 300px, 200px -200px;}
}

.intro-screen{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  animation: fadeOut 5s forwards;
}

.intro-screen h1{
  font-family:'Great Vibes',cursive;
  font-size:60px;
  color:#f8a5c2;
  opacity:0;
  animation: fadeIn 3s forwards;
}

@keyframes fadeIn{
  to{opacity:1;}
}

@keyframes fadeOut{
  0%,90%{opacity:1;}
  100%{opacity:0;visibility:hidden;}
}

.container{
  padding:40px 20px;
}

.title{
  font-size:28px;
  letter-spacing:2px;
  margin-bottom:10px;
  color:#f8a5c2;
}

.names{
  margin:30px 0;
}

.names .ceremony-title{
  font-size:22px;
  letter-spacing:6px;
  text-transform:uppercase;
  color:#d4af37;
  margin-bottom:15px;
}

.names .couple-names{
  font-family:'Great Vibes',cursive;
  font-size:72px;
  color:#f8a5c2;
  text-shadow:0 4px 15px rgba(248,165,194,0.4);
  animation: fadeZoom 2s ease forwards;
  opacity:0;
}

.gold-divider{
  width:120px;
  height:2px;
  margin:15px auto 20px auto;
  background:linear-gradient(to right,transparent,#d4af37,transparent);
}

@keyframes fadeZoom{
  from{opacity:0; transform:scale(0.9);}
  to{opacity:1; transform:scale(1);}
}

.parents{
  display:flex;
  justify-content:center;
  gap:80px;
  flex-wrap:wrap;
  margin-top:40px;
  font-size:18px;
}

.parents > div{
  background:rgba(255,255,255,0.05);
  padding:25px 35px;
  border-radius:20px;
  border:1px solid rgba(212,175,55,0.4);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);
}

.parents strong{
  font-size:20px;
  letter-spacing:2px;
  color:#d4af37;
  display:block;
  margin-bottom:10px;
}

.section{
  margin-top:60px;
}

.countdown{
  margin-top:35px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
}

.time-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:100px;
  height:110px;
  border-radius:20px;
  background:linear-gradient(145deg,#f8a5c2,#fbc2d4);
  box-shadow:0 8px 25px rgba(248,165,194,0.5);
  transition:transform 0.3s ease, box-shadow 0.3s ease;
}

.time-box:hover{
  transform:translateY(-5px);
  box-shadow:0 12px 35px rgba(248,165,194,0.7);
}

.time-box span{
  font-size:32px;
  font-weight:bold;
  color:#ffffff;
}

.time-label{
  font-size:14px;
  margin-top:6px;
  color:#fff;
  opacity:0.9;
  letter-spacing:1px;
  text-transform:uppercase;
}

button.music-btn{
  position:fixed;
  bottom:30px;
  right:30px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:linear-gradient(145deg,#f8a5c2,#fbc2d4);
  font-size:26px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(248,165,194,0.6);
}
</style>
</head>
<body>

<div class="intro-screen">
  <h1>Thành Đạt & Phương Thảo</h1>
</div>

<div class="container">
  <div class="title">Trân trọng kính mời</div>
  <div class="names">
    <div class="ceremony-title">Lễ Thành Hôn</div>
    <div class="gold-divider"></div>
  </div>

  <div style="font-size:64px;font-family:'Great Vibes',cursive;color:#f8a5c2;">
    Thành Đạt & Phương Thảo
  </div>

  <div class="parents">
    <div>
      <strong>Gia đình chú rể</strong><br>
      Ông Võ Quang Sơn<br>
      Bà Trần Thị Lan
    </div>
    <div>
      <strong>Gia đình cô dâu</strong><br>
      Ông Nguyễn Hồng Sơn<br>
      Bà Trần Thị Lam
    </div>
  </div>

  <div class="section">
    <h2>03.04.2026</h2>
    <p>Đô Lương, Nghệ An</p>
    <div class="countdown" id="countdown"></div>
  </div>
</div>

<!-- Gallery Section -->
<div class="section">
  <h2>Khoảnh khắc yêu thương</h2>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:30px;">
    <img src="image1.jpg" style="width:100%;border-radius:20px;">
    <img src="image2.jpg" style="width:100%;border-radius:20px;">
    <img src="image3.jpg" style="width:100%;border-radius:20px;">
    <img src="image4.jpg" style="width:100%;border-radius:20px;">
    <img src="image5.jpg" style="width:100%;border-radius:20px;">
    <img src="image6.jpg" style="width:100%;border-radius:20px;">
    <img src="image7.jpg" style="width:100%;border-radius:20px;">
  </div>
</div>

<audio id="bgMusic" src="music.mp3" preload="auto" loop></audio>
<button class="music-btn" onclick="toggleMusic()">🎹</button>

<script>
const music = document.getElementById('bgMusic');

function toggleMusic(){
  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}

// Phát nhạc khi intro fade xong
window.addEventListener('load',()=>{
  setTimeout(()=>{
    music.volume = 0;
    music.play().then(()=>{
      let v = 0;
      const fade = setInterval(()=>{
        if(v >= 1){
          music.volume = 1;
          clearInterval(fade);
        } else {
          v += 0.02;
          music.volume = v;
        }
      },150);
    }).catch(()=>{
      document.addEventListener('click', function once(){
        music.play();
        document.removeEventListener('click', once);
      });
    });
  },5000);
});

// Countdown chuẩn
const targetDate = new Date("2026-04-03T10:00:00").getTime();
const countdownEl = document.getElementById("countdown");

setInterval(()=>{
  const now = new Date().getTime();
  const distance = targetDate - now;

  if(!countdownEl) return;

  if(distance <= 0){
    countdownEl.innerHTML = "Hôm nay là ngày trọng đại!";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  countdownEl.innerHTML = `
    <div class="time-box"><span>${days}</span><div class="time-label">Ngày</div></div>
    <div class="time-box"><span>${hours}</span><div class="time-label">Giờ</div></div>
    <div class="time-box"><span>${minutes}</span><div class="time-label">Phút</div></div>
    <div class="time-box"><span>${seconds}</span><div class="time-label">Giây</div></div>
  `;
},1000);
</script>


  <!-- Side Images -->
  <img src="image2.jpg" alt="left decoration" class="side-img left-img">
  <img src="image5.jpg" alt="right decoration" class="side-img right-img">

  <style>
    .side-img{
      position:fixed;
      top:50%;
      width:260px;
      max-width:22vw;
      opacity:0.95;
      z-index:0;
      pointer-events:none;
      animation:floatSide 6s ease-in-out infinite;
      transition:all 0.6s ease;
      filter:drop-shadow(0 15px 30px rgba(244,143,177,0.35));
    }

    .left-img{
      left:40px;
      transform:translateY(-50%) rotate(-3deg);
    }

    .right-img{
      right:40px;
      transform:translateY(-50%) rotate(3deg);
    }

    @media(max-width:1200px){
      .side-img{
        width:180px;
      }
    }

    @media(max-width:1024px){
      .side-img{
        display:none;
      }
    }

    .side-img.fade-in{
      opacity:1;
      transform:translateY(-50%) scale(1.03);
    }

    @keyframes floatSide{
      0%{ transform:translateY(-50%) translateY(0px); }
      50%{ transform:translateY(-50%) translateY(-15px); }
      100%{ transform:translateY(-50%) translateY(0px); }
    }

    .left-img{
      left:0;
    }

    .right-img{
      right:0;
    }

    @media(max-width:1024px){
      .side-img{
        display:none;
      }
    }
  </style>


<script>
  document.addEventListener("DOMContentLoaded", function(){
    const audio = document.querySelector("audio");
    if(!audio) return;

    audio.volume = 0.6;

    const playPromise = audio.play();

    if (playPromise !== undefined) {
      playPromise.catch(() => {
        // Nếu bị chặn autoplay → phát khi người dùng click lần đầu
        const resumeAudio = () => {
          audio.play();
          document.removeEventListener("click", resumeAudio);
          document.removeEventListener("touchstart", resumeAudio);
        };
        document.addEventListener("click", resumeAudio);
        document.addEventListener("touchstart", resumeAudio);
      });
    }
  });
</script>

</body>
</html>
